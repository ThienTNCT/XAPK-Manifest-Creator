<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAPK Manifest Creator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 25px;}
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }
        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }
        
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #555;}
        
        input[type="text"], input[type="number"], textarea, select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
        }
        
        /* CSS cho các trường nhập liệu động */
        .dynamic-container {
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 5px;
            background-color: #fafafa;
        }
        .dynamic-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .dynamic-row input { flex: 1; }
        
        /* Các nút bấm */
        .btn-action {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .btn-add { background-color: #2ecc71; color: white; margin-bottom: 10px; }
        .btn-add:hover { background-color: #27ae60; }
        .btn-remove { background-color: #e74c3c; color: white; }
        .btn-remove:hover { background-color: #c0392b; }

        .btn-main {
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        .btn-main:hover { background-color: #0056b3; }
        
        .result-box { margin-top: 30px; }
        pre {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>XAPK Manifest Creator</h2>
        
        <div class="grid-2">
            <div class="form-group full-width">
                <label>XAPK Version (Phiên bản chuẩn XAPK):</label>
                <input type="text" id="xapkVersion" value="2">
            </div>

            <div class="form-group">
                <label>Package Name (Tên gói ứng dụng):</label>
                <input type="text" id="packageName" value="com.example.app">
            </div>

            <div class="form-group">
                <label>App Name (Tên ứng dụng gốc):</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="appName" value="My Application" style="flex: 2;">
                    <select id="sourceLang" style="flex: 1;" title="Ngôn ngữ gốc để dịch tự động">
                        <option value="auto">Auto-Detect</option>
                        <option value="en">English (en)</option>
                        <option value="vi">Tiếng Việt (vi)</option>
                        <option value="zh">Chinese (zh)</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group full-width dynamic-container">
                <label>Locales Name (Danh sách ngôn ngữ & Dịch tự động):</label>
                <button type="button" class="btn-action btn-add" onclick="addLocaleRow()">+ Add Locale (Thêm ngôn ngữ)</button>
                <div id="localesContainer"></div>
                <datalist id="localeList"></datalist>
            </div>

            <div class="form-group">
                <label>Version Code (Mã phiên bản):</label>
                <input type="text" id="versionCode" value="1">
            </div>
            <div class="form-group">
                <label>Version Name (Tên phiên bản):</label>
                <input type="text" id="versionName" value="1.0">
            </div>

            <div class="form-group">
                <label>Min SDK Version (SDK tối thiểu):</label>
                <input type="text" id="minSdk" value="21">
            </div>
            <div class="form-group">
                <label>Target SDK Version (SDK mục tiêu):</label>
                <input type="text" id="targetSdk" value="33">
            </div>

            <div class="form-group full-width dynamic-container">
                <label>Permissions (Quyền hạn):</label>
                <button type="button" class="btn-action btn-add" onclick="addPermissionRow()">+ Add Permission (Thêm quyền)</button>
                <div id="permissionsContainer"></div>
                <datalist id="permissionsList"></datalist>
            </div>

            <div class="form-group full-width dynamic-container">
                <label>Split Configs (ID cấu hình chia nhỏ):</label>
                <button type="button" class="btn-action btn-add" onclick="addSplitConfigRow()">+ Add Split Config (Thêm ID)</button>
                <div id="splitConfigsContainer"></div>
                <datalist id="splitConfigsList"></datalist>
            </div>

            <div class="form-group">
                <label>Total Size (Tổng kích thước dạng Bytes):</label>
                <input type="text" id="totalSize" value="10485760">
            </div>

            <div class="form-group">
                <label>Icon File Name (Tên tệp biểu tượng):</label>
                <input type="text" id="icon" value="icon.png">
            </div>

            <div class="form-group full-width">
                <label>Expansion Version (Phiên bản OBB):</label>
                <input type="text" id="expansionVersion" value="1">
            </div>

            <div class="form-group full-width dynamic-container">
                <label>Expansions (Danh sách tệp mở rộng/OBB):</label>
                <button type="button" class="btn-action btn-add" onclick="addExpansionRow()">+ Add Expansion (Thêm tệp OBB)</button>
                <div id="expansionsContainer"></div>
            </div>

            <div class="form-group full-width dynamic-container">
                <label>Split APKs (Danh sách tệp APK gốc & chia nhỏ):</label>
                <button type="button" class="btn-action btn-add" onclick="addSplitApkRow()">+ Add APK (Thêm tệp APK)</button>
                <div id="splitApksContainer"></div>
            </div>
        </div>

        <button class="btn-main" onclick="generateAndDownloadJSON()">Generate and Download JSON (Tạo và Tải xuống)</button>

        <div class="result-box">
            <label>Preview (Xem trước nội dung tệp):</label>
            <pre id="jsonPreview">// Click the button to generate (Bấm nút để tạo)</pre>
        </div>
    </div>

        // --- HÀM DỊCH GOOGLE ---
        async function translateText(text, sourceLang, targetLang) {
            if (!text || !targetLang) return text;
            let ggLang = targetLang.split('-')[0]; 
            if (targetLang.startsWith("zh") || targetLang.startsWith("pt")) ggLang = targetLang;
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${ggLang}&dt=t&q=${encodeURIComponent(text)}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                return data[0][0][0];
            } catch (error) {
                console.error("Lỗi dịch thuật:", error);
                return text;
            }
        }

                <input type="text" class="loc-code" placeholder="Mã (vd: vi, en)" value="${langCode}" list="localeList">
                <input type="text" class="loc-name" placeholder="Tên App bản địa hóa" value="${appName}">
                <button type="button" class="btn-action btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(row);

            const codeInput = row.querySelector('.loc-code');
            const nameInput = row.querySelector('.loc-name');
            codeInput.addEventListener('change', async function() {
                const targetCode = this.value.trim();
                const sourceText = document.getElementById('appName').value.trim();
                const sourceLang = document.getElementById('sourceLang').value;
                if (targetCode && sourceText && (nameInput.value === '' || nameInput.value === sourceText)) {
                    nameInput.value = "Đang dịch...";
                    const translatedText = await translateText(sourceText, sourceLang, targetCode);
                    nameInput.value = translatedText;
                }
            });
        }

        // 2. Quản lý Permissions (Mới)
        function addPermissionRow(permValue = '') {
            const container = document.getElementById('permissionsContainer');
            const row = document.createElement('div');
            row.className = 'dynamic-row';
            row.innerHTML = `
                <input type="text" class="perm-val" placeholder="vd: android.permission.INTERNET" value="${permValue}" list="permissionsList">
                <button type="button" class="btn-action btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(row);
        }

        // 3. Quản lý Split Configs (Mới)
        function addSplitConfigRow(configValue = '') {
            const container = document.getElementById('splitConfigsContainer');
            const row = document.createElement('div');
            row.className = 'dynamic-row';
            row.innerHTML = `
                <input type="text" class="config-val" placeholder="vd: config.xxhdpi" value="${configValue}" list="splitConfigsList">
                <button type="button" class="btn-action btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(row);
        }

        // 4. Quản lý Expansions
        function addExpansionRow(filePath = '') {
            const container = document.getElementById('expansionsContainer');
            const row = document.createElement('div');
            row.className = 'dynamic-row';
            row.innerHTML = `
                <input type="text" class="exp-file" placeholder="File Path (Đường dẫn OBB)" value="${filePath}">
                <button type="button" class="btn-action btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(row);
        }

        // 5. Quản lý Split APKs
        function addSplitApkRow(fileName = '', fileId = '') {
            const container = document.getElementById('splitApksContainer');
            const row = document.createElement('div');
            row.className = 'dynamic-row';
            row.innerHTML = `
                <input type="text" class="apk-file" placeholder="File Name (vd: base.apk)" value="${fileName}">
                <input type="text" class="apk-id" placeholder="ID (vd: base)" value="${fileId}">
                <button type="button" class="btn-action btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(row);
        }

        // --- KHỞI TẠO DỮ LIỆU KHI TẢI TRANG ---
        function populateDatalist(elementId, dataArray) {
            const dataList = document.getElementById(elementId);
            dataArray.forEach(item => {
                const option = document.createElement('option');
                option.value = item;
                dataList.appendChild(option);
            });
        }

        window.onload = function() {
            // Đổ dữ liệu vào các Datalist ẩn để làm gợi ý
            populateDatalist('localeList', languageCodes);
            populateDatalist('permissionsList', allPermissions);
            populateDatalist('splitConfigsList', allSplitConfigs);

            // Các trường khởi tạo mặc định
            addLocaleRow('en', 'My Application');
            addLocaleRow('vi', 'Ứng Dụng Của Tôi');

            // Khởi tạo mặc định cho Permissions
            addPermissionRow('android.permission.INTERNET');
            addPermissionRow('android.permission.ACCESS_NETWORK_STATE');

            // Khởi tạo mặc định cho Split Configs
            addSplitConfigRow('config.xxhdpi');
            addSplitConfigRow('config.arm64_v8a');
            addSplitConfigRow('config.en');

            const pkg = document.getElementById('packageName').value;
            const expVer = document.getElementById('expansionVersion').value;
            addExpansionRow(`Android/obb/${pkg}/main.${expVer}.${pkg}.obb`);
            addExpansionRow(`Android/obb/${pkg}/patch.${expVer}.${pkg}.obb`);

            addSplitApkRow('base.apk', 'base');
            addSplitApkRow('config.xxhdpi.apk', 'config.xxhdpi');
        };

        // --- HÀM TẠO VÀ XUẤT JSON ---
        function generateAndDownloadJSON() {
            const xapkVersion = document.getElementById('xapkVersion').value;
            const packageName = document.getElementById('packageName').value;
            const appName = document.getElementById('appName').value;
            const versionCode = document.getElementById('versionCode').value;
            const versionName = document.getElementById('versionName').value;
            const minSdk = document.getElementById('minSdk').value;
            const targetSdk = document.getElementById('targetSdk').value;
            const totalSize = document.getElementById('totalSize').value;
            const iconName = document.getElementById('icon').value;
            const expVersion = document.getElementById('expansionVersion').value;

            // 1. Trích xuất Locales
            const localesObj = {};
            document.querySelectorAll('#localesContainer .dynamic-row').forEach(row => {
                const code = row.querySelector('.loc-code').value.trim();
                const name = row.querySelector('.loc-name').value.trim();
                if (code) localesObj[code] = name;
            });

            // 2. Trích xuất Permissions (Mới)
            const permissionsArray = [];
            document.querySelectorAll('#permissionsContainer .dynamic-row').forEach(row => {
                const val = row.querySelector('.perm-val').value.trim();
                if (val) permissionsArray.push(val);
            });

            // 3. Trích xuất Split Configs (Mới)
            const splitConfigsArray = [];
            document.querySelectorAll('#splitConfigsContainer .dynamic-row').forEach(row => {
                const val = row.querySelector('.config-val').value.trim();
                if (val) splitConfigsArray.push(val);
            });

            // 4. Trích xuất Expansions
            const expansionsArray = [];
            document.querySelectorAll('#expansionsContainer .dynamic-row').forEach(row => {
                const file = row.querySelector('.exp-file').value.trim();
                if (file) {
                    expansionsArray.push({
                        "file": file,
                        "install_location": "EXTERNAL_STORAGE",
                        "install_path": file
                    });
                }
            });

            // 5. Trích xuất Split APKs
            const splitApksArray = [];
            document.querySelectorAll('#splitApksContainer .dynamic-row').forEach(row => {
                const file = row.querySelector('.apk-file').value.trim();
                const id = row.querySelector('.apk-id').value.trim();
                if (file) {
                    splitApksArray.push({ "file": file, "id": id });
                }
            });

            // ĐÓNG GÓI JSON (Thứ tự chặt chẽ)
            const manifestData = {
                "xapk_version": xapkVersion,
                "package_name": packageName,
                "name": appName,
                "locales_name": localesObj,
                "version_code": versionCode,
                "version_name": versionName,
                "min_sdk_version": minSdk,
                "target_sdk_version": targetSdk,
                "permissions": permissionsArray,
                "split_configs": splitConfigsArray,
                "total_size": totalSize,
                "icon": iconName,
                "expansion_version": expVersion,
                "expansions": expansionsArray,
                "split_apks": splitApksArray
            };

            const jsonString = JSON.stringify(manifestData, null, 4);
            document.getElementById('jsonPreview').textContent = jsonString;

            const fileBlob = new Blob([jsonString], { type: "application/json" });
            const fileUrl = URL.createObjectURL(fileBlob);
            const downloadLink = document.createElement('a');
            downloadLink.href = fileUrl;
            downloadLink.download = "manifest.json";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            URL.revokeObjectURL(fileUrl);
        }
    </script>
</body>
</html>
