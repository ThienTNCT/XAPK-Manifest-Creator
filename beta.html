<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAPK Manifest Creator - Smart Auto Fill</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 950px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 25px;}
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }
        
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #555;}
        input[type="text"], input[type="number"], select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        
        .dynamic-container { border: 1px solid #e0e0e0; padding: 15px; border-radius: 5px; background-color: #fafafa; }
        .dynamic-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; transition: opacity 0.3s; }
        .dynamic-row input { flex: 1; }
        
        /* Chỉnh riêng cho Expansion có 3 trường */
        .exp-row input { flex: 1; min-width: 150px; }
        .exp-row input.exp-loc { flex: 0.5; min-width: 120px; background-color: #eee; color: #666;}
        
        /* Trạng thái bị Vô hiệu hóa (Dành cho OBB) */
        .row-disabled { opacity: 0.4; pointer-events: none; }
        /* Fix để nút Toggle vẫn bấm được khi row bị disabled */
        .row-disabled .btn-toggle { pointer-events: auto; background-color: #95a5a6; }

        .btn-action { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-add { background-color: #2ecc71; color: white; margin-bottom: 10px; }
        .btn-add:hover { background-color: #27ae60; }
        .btn-remove { background-color: #e74c3c; color: white; }
        .btn-remove:hover { background-color: #c0392b; }
        .btn-toggle { background-color: #f39c12; color: white; min-width: 60px; }
        .btn-toggle:hover { background-color: #e67e22; }

        .btn-main { width: 100%; padding: 15px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .btn-main:hover { background-color: #0056b3; }
        
        .result-box { margin-top: 30px; }
        pre { background-color: #1e1e1e; color: #d4d4d4; padding: 20px; border-radius: 5px; overflow-x: auto; font-size: 13px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>XAPK Manifest Creator</h2>
        
        <div class="grid-2">
            <div class="form-group full-width">
                <label>XAPK Version:</label>
                <input type="text" id="xapkVersion" value="2">
            </div>

            <div class="form-group">
                <label>Package Name (Tên gói):</label>
                <input type="text" id="packageName" value="com.example.app" oninput="triggerSmartFill()">
            </div>
            
            <div class="form-group">
                <label>Expansion Version (Bản OBB):</label>
                <input type="text" id="expansionVersion" value="1" oninput="triggerSmartFill()">
            </div>

            <div class="form-group full-width">
                <label>App Name (Tên ứng dụng gốc):</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="appName" value="My Application" style="flex: 3;" onchange="translateAllLocales()">
                    <select id="sourceLang" style="flex: 1;" onchange="translateAllLocales()">
                        <option value="auto">Auto-Detect</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group full-width dynamic-container">
                <label>Locales Name (Danh sách ngôn ngữ & Dịch tự động):</label>
                <button type="button" class="btn-action btn-add" onclick="addLocaleRow()">+ Add Locale</button>
                <div id="localesContainer"></div>
                <datalist id="localeList"></datalist>
            </div>

            <div class="form-group">
                <label>Version Code:</label>
                <input type="text" id="versionCode" value="1">
            </div>
            <div class="form-group">
                <label>Version Name:</label>
                <input type="text" id="versionName" value="1.0">
            </div>

            <div class="form-group">
                <label>Min SDK Version:</label>
                <input type="text" id="minSdk" value="21">
            </div>
            <div class="form-group">
                <label>Target SDK Version:</label>
                <input type="text" id="targetSdk" value="33">
            </div>

            <div class="form-group full-width dynamic-container">
                <label>Permissions (Quyền hạn):</label>
                <button type="button" class="btn-action btn-add" onclick="addPermissionRow()">+ Add Permission</button>
                <div id="permissionsContainer"></div>
                <datalist id="permissionsList"></datalist>
            </div>

            <div class="form-group full-width dynamic-container">
                <label>Split Configs (ID cấu hình chia nhỏ):</label>
                <button type="button" class="btn-action btn-add" onclick="addSplitConfigAndApkRow()">+ Add Split Config</button>
                <div id="splitConfigsContainer"></div>
                <datalist id="splitConfigsList"></datalist>
            </div>

            <div class="form-group">
                <label>Total Size (Bytes):</label>
                <input type="text" id="totalSize" value="10485760">
            </div>
            <div class="form-group">
                <label>Icon File Name:</label>
                <input type="text" id="icon" value="icon.png">
            </div>

            <div class="form-group full-width dynamic-container">
                <label>Expansions (Danh sách tệp OBB - Mỗi tệp 3 thuộc tính):</label>
                <button type="button" class="btn-action btn-add" onclick="addExpansionRow()">+ Add Custom Expansion</button>
                <div id="expansionsContainer">
                    <div class="dynamic-row exp-row" id="rowMainObb">
                        <input type="text" class="exp-file" placeholder="File" oninput="syncExpansionPath(this)" title="File Path">
                        <input type="text" class="exp-path" placeholder="Install Path" title="Install Path">
                        <input type="text" class="exp-loc" value="EXTERNAL_STORAGE" readonly title="Install Location (Locked)">
                        <button type="button" class="btn-action btn-toggle" onclick="toggleObbRow('rowMainObb')">Tắt</button>
                    </div>
                    <div class="dynamic-row exp-row" id="rowPatchObb">
                        <input type="text" class="exp-file" placeholder="File" oninput="syncExpansionPath(this)" title="File Path">
                        <input type="text" class="exp-path" placeholder="Install Path" title="Install Path">
                        <input type="text" class="exp-loc" value="EXTERNAL_STORAGE" readonly title="Install Location (Locked)">
                        <button type="button" class="btn-action btn-toggle" onclick="toggleObbRow('rowPatchObb')">Tắt</button>
                    </div>
                </div>
            </div>

            <div class="form-group full-width dynamic-container">
                <label>Split APKs (Danh sách tệp APK gốc & chia nhỏ):</label>
                <p style="font-size: 12px; color: #e67e22; margin-top: -5px;">* Mục này tự động đồng bộ số lượng dòng và ID từ Split Configs ở trên.</p>
                <div id="splitApksContainer">
                    <div class="dynamic-row" id="rowBaseApk">
                        <input type="text" class="apk-file" title="Tên File APK">
                        <input type="text" class="apk-id" value="base" readonly style="background-color:#eee; color:#666;" title="ID (Locked)">
                        <button type="button" class="btn-action" style="background-color:#ccc; cursor:not-allowed; color:#fff;" disabled>X</button>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn-main" onclick="generateAndDownloadJSON()">Generate and Download JSON</button>

        <div class="result-box">
            <label>Preview (Xem trước nội dung tệp):</label>
            <pre id="jsonPreview">// Click the button to generate</pre>
        </div>
    </div>

    <script>
        // --- DỮ LIỆU TỪ TỆP CỦA BẠN ---
        const languageCodes = ["af","am","ar","az-AZ","bg","bn-BD","br","ca","cs","da","de","el","en","en-AU","en-GB","en-IN","es","es-US","et-EE","eu-ES","fa","fi","fr","fr-CA","gl-ES","gu-IN","hi","hr","hu","hy-AM","in","is-IS","it","iw","ja","ka-GE","kk-KZ","km-KH","kn-IN","ko","ky-KG","lo-LA","lt","lv","mk-MK","ml-IN","mn-MN","mr-IN","ms-MY","my-MM","nb","ne-NP","nl","pa-IN","pl","pt","pt-BR","pt-PT","ro","ru","si-LK","sk","sl","sq-AL","sr","sv","sw","ta-IN","te-IN","th","tl","tr","uk","ur-PK","uz-UZ","vi","zh","zh-CN","zh-HK","zh-TW","zu"];
        const allPermissions = ["android.permission.INTERNET", "android.permission.ACCESS_NETWORK_STATE", "android.permission.READ_EXTERNAL_STORAGE", "android.permission.WRITE_EXTERNAL_STORAGE"]; // Rút gọn để code dễ nhìn, bạn có thể thay mảng đầy đủ vào
        const allSplitConfigs = ["config.arm64_v8a", "config.armeabi_v7a", "config.x86", "config.xxhdpi", "config.en"];

        // --- HÀM DỊCH GOOGLE ---
        async function translateText(text, sourceLang, targetLang) {
            if (!text || !targetLang) return text;
            let ggLang = targetLang.split('-')[0]; 
            if (targetLang.startsWith("zh") || targetLang.startsWith("pt")) ggLang = targetLang;
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${ggLang}&dt=t&q=${encodeURIComponent(text)}`;
            try {
                const response = await fetch(url); const data = await response.json(); return data[0][0][0];
            } catch (e) { return text; }
        }

        async function translateAllLocales() {
            const sourceText = document.getElementById('appName').value.trim();
            const sourceLang = document.getElementById('sourceLang').value;
            if (!sourceText) return;
            const rows = document.querySelectorAll('#localesContainer .dynamic-row');
            for (let row of rows) {
                const codeInput = row.querySelector('.loc-code');
                const nameInput = row.querySelector('.loc-name');
                const targetCode = codeInput.value.trim();
                if (targetCode) {
                    nameInput.value = "Đang dịch...";
                    nameInput.value = await translateText(sourceText, sourceLang, targetCode);
                }
            }
        }

        // --- CÁC HÀM SMART AUTO FILL ---

        // 1. Kích hoạt khi sửa Package Name hoặc Expansion Version
        function triggerSmartFill() {
            const pkg = document.getElementById('packageName').value.trim();
            const expVer = document.getElementById('expansionVersion').value.trim();
            
            // Xử lý Base APK
            const baseFile = document.querySelector('#rowBaseApk .apk-file');
            if (baseFile && pkg) baseFile.value = `${pkg}.apk`;

            // Xử lý Main OBB
            const mainObbRow = document.getElementById('rowMainObb');
            if (mainObbRow && pkg && expVer) {
                const path = `Android/obb/${pkg}/main.${expVer}.${pkg}.obb`;
                mainObbRow.querySelector('.exp-file').value = path;
                mainObbRow.querySelector('.exp-path').value = path; // Tự động đồng bộ install_path
            }

            // Xử lý Patch OBB
            const patchObbRow = document.getElementById('rowPatchObb');
            if (patchObbRow && pkg && expVer) {
                const path = `Android/obb/${pkg}/patch.${expVer}.${pkg}.obb`;
                patchObbRow.querySelector('.exp-file').value = path;
                patchObbRow.querySelector('.exp-path').value = path;
            }
        }

        // 2. Kích hoạt khi sửa 'file' của bất kỳ Expansion nào (tự copy sang install_path)
        function syncExpansionPath(inputElement) {
            const row = inputElement.closest('.dynamic-row');
            const pathInput = row.querySelector('.exp-path');
            pathInput.value = inputElement.value; // Tự điền nhưng vẫn cho phép user nhấp vào sửa sau đó
        }

        // 3. Hàm bật/tắt dành riêng cho Main và Patch OBB
        function toggleObbRow(rowId) {
            const row = document.getElementById(rowId);
            const btn = row.querySelector('.btn-toggle');
            row.classList.toggle('row-disabled');
            
            if (row.classList.contains('row-disabled')) {
                btn.textContent = "Bật";
                btn.style.backgroundColor = "#27ae60"; // Màu xanh
                // Disable inputs
                row.querySelectorAll('input').forEach(inp => inp.disabled = true);
            } else {
                btn.textContent = "Tắt";
                btn.style.backgroundColor = "#f39c12"; // Màu cam
                // Enable inputs
                row.querySelectorAll('input').forEach(inp => inp.disabled = false);
            }
        }

        // --- HÀM THÊM/XÓA CÁC TRƯỜNG KHÁC ---

        function addLocaleRow(langCode = '', appName = '') {
            const container = document.getElementById('localesContainer');
            const row = document.createElement('div'); row.className = 'dynamic-row';
            row.innerHTML = `<input type="text" class="loc-code" placeholder="Mã (vd: vi)" value="${langCode}" list="localeList">
                             <input type="text" class="loc-name" placeholder="Tên App bản địa hóa" value="${appName}">
                             <button type="button" class="btn-action btn-remove" onclick="this.parentElement.remove()">X</button>`;
            container.appendChild(row);
            const codeInput = row.querySelector('.loc-code'); const nameInput = row.querySelector('.loc-name');
            codeInput.addEventListener('change', async function() {
                const targetCode = this.value.trim(); const sourceText = document.getElementById('appName').value.trim();
                const sourceLang = document.getElementById('sourceLang').value;
                if (targetCode && sourceText) { nameInput.value = "Đang dịch..."; nameInput.value = await translateText(sourceText, sourceLang, targetCode); }
            });
        }

        function addPermissionRow(permValue = '') {
            const container = document.getElementById('permissionsContainer');
            const row = document.createElement('div'); row.className = 'dynamic-row';
            row.innerHTML = `<input type="text" class="perm-val" placeholder="vd: android.permission.INTERNET" value="${permValue}" list="permissionsList">
                             <button type="button" class="btn-action btn-remove" onclick="this.parentElement.remove()">X</button>`;
            container.appendChild(row);
        }

        function addExpansionRow(filePath = '', installPath = '') {
            const container = document.getElementById('expansionsContainer');
            const row = document.createElement('div'); row.className = 'dynamic-row exp-row';
            row.innerHTML = `<input type="text" class="exp-file" placeholder="File" value="${filePath}" oninput="syncExpansionPath(this)">
                             <input type="text" class="exp-path" placeholder="Install Path" value="${installPath || filePath}">
                             <input type="text" class="exp-loc" value="EXTERNAL_STORAGE" readonly>
                             <button type="button" class="btn-action btn-remove" onclick="this.parentElement.remove()">X</button>`;
            container.appendChild(row);
        }

        // --- LOGIC ĐỒNG BỘ SPLIT CONFIG & SPLIT APK ---
        
        // Sinh ID duy nhất để nối Row Config với Row APK tương ứng
        function generateId() { return '_' + Math.random().toString(36).substr(2, 9); }

        function addSplitConfigAndApkRow(configValue = '') {
            const uniqueId = generateId();
            
            // 1. Thêm vào Split Configs
            const configContainer = document.getElementById('splitConfigsContainer');
            const configRow = document.createElement('div'); 
            configRow.className = 'dynamic-row';
            configRow.dataset.syncId = uniqueId; // Gắn mác để tìm kiếm
            configRow.innerHTML = `<input type="text" class="config-val" placeholder="vd: config.xxhdpi" value="${configValue}" list="splitConfigsList" oninput="syncSplitApkRow('${uniqueId}', this.value)">
                                   <button type="button" class="btn-action btn-remove" onclick="removeSyncedRows('${uniqueId}')">X</button>`;
            configContainer.appendChild(configRow);

            // 2. Thêm TỰ ĐỘNG vào Split APKs
            const apkContainer = document.getElementById('splitApksContainer');
            const apkRow = document.createElement('div'); 
            apkRow.className = 'dynamic-row';
            apkRow.dataset.syncId = uniqueId;
            apkRow.innerHTML = `<input type="text" class="apk-file" placeholder="Tên File APK" value="${configValue ? configValue+'.apk' : ''}">
                                <input type="text" class="apk-id" placeholder="ID" value="${configValue}" readonly style="background-color:#eee; color:#666;">
                                <button type="button" class="btn-action btn-remove" onclick="removeSyncedRows('${uniqueId}')">X</button>`;
            apkContainer.appendChild(apkRow);
        }

        // Khi gõ vào Split Config -> Cập nhật sang Split APK
        function syncSplitApkRow(syncId, newConfigValue) {
            const apkRow = document.querySelector(`#splitApksContainer .dynamic-row[data-sync-id="${syncId}"]`);
            if (apkRow) {
                apkRow.querySelector('.apk-file').value = newConfigValue ? `${newConfigValue}.apk` : '';
                apkRow.querySelector('.apk-id').value = newConfigValue; // Cập nhật ID
            }
        }

        // Khi bấm Xóa ở bất kỳ mục nào -> Xóa luôn cả 2 để giữ đồng bộ
        function removeSyncedRows(syncId) {
            const configRow = document.querySelector(`#splitConfigsContainer .dynamic-row[data-sync-id="${syncId}"]`);
            const apkRow = document.querySelector(`#splitApksContainer .dynamic-row[data-sync-id="${syncId}"]`);
            if (configRow) configRow.remove();
            if (apkRow) apkRow.remove();
        }

        // --- KHỞI TẠO DỮ LIỆU KHI TẢI TRANG ---
        function populateDatalist(elementId, dataArray) {
            const dataList = document.getElementById(elementId);
            dataArray.forEach(item => { const opt = document.createElement('option'); opt.value = item; dataList.appendChild(opt); });
        }

        window.onload = function() {
            populateDatalist('localeList', languageCodes);
            populateDatalist('permissionsList', allPermissions);
            populateDatalist('splitConfigsList', allSplitConfigs);

            const sourceLangSelect = document.getElementById('sourceLang');
            languageCodes.forEach(code => {
                const opt = document.createElement('option'); opt.value = code; opt.textContent = code; sourceLangSelect.appendChild(opt);
            });

            addLocaleRow('en', ''); addLocaleRow('vi', '');
            translateAllLocales();

            addPermissionRow('android.permission.INTERNET');
            addPermissionRow('android.permission.ACCESS_NETWORK_STATE');

            // Kích hoạt hàm Smart Fill lần đầu để điền cho OBB và Base APK
            triggerSmartFill();

            // Thêm các Split Config (Hàm này sẽ tự động sinh ra Split APK tương ứng)
            addSplitConfigAndApkRow('config.xxhdpi');
            addSplitConfigAndApkRow('config.arm64_v8a');
            addSplitConfigAndApkRow('config.en');
        };

        // --- HÀM TẠO VÀ XUẤT JSON ---
        function generateAndDownloadJSON() {
            // ... (Lấy dữ liệu cơ bản)
            const packageName = document.getElementById('packageName').value;
            const appName = document.getElementById('appName').value;
            // ... (Các trường khác tương tự code cũ)

            const localesObj = {};
            document.querySelectorAll('#localesContainer .dynamic-row').forEach(row => {
                const code = row.querySelector('.loc-code').value.trim();
                const name = row.querySelector('.loc-name').value.trim();
                if (code) localesObj[code] = name;
            });

            const permissionsArray = [];
            document.querySelectorAll('#permissionsContainer .dynamic-row').forEach(row => {
                const val = row.querySelector('.perm-val').value.trim();
                if (val) permissionsArray.push(val);
            });

            const splitConfigsArray = [];
            document.querySelectorAll('#splitConfigsContainer .dynamic-row').forEach(row => {
                const val = row.querySelector('.config-val').value.trim();
                if (val) splitConfigsArray.push(val);
            });

            // 13. Lấy Expansions (Bỏ qua các dòng bị disable)
            const expansionsArray = [];
            document.querySelectorAll('#expansionsContainer .dynamic-row:not(.row-disabled)').forEach(row => {
                const file = row.querySelector('.exp-file').value.trim();
                const installPath = row.querySelector('.exp-path').value.trim();
                const loc = row.querySelector('.exp-loc').value.trim();
                if (file) {
                    expansionsArray.push({
                        "file": file,
                        "install_location": loc,
                        "install_path": installPath
                    });
                }
            });

            // 14. Lấy Split APKs
            const splitApksArray = [];
            document.querySelectorAll('#splitApksContainer .dynamic-row').forEach(row => {
                const file = row.querySelector('.apk-file').value.trim();
                const id = row.querySelector('.apk-id').value.trim();
                if (file) {
                    splitApksArray.push({ "file": file, "id": id });
                }
            });

            const manifestData = {
                "xapk_version": document.getElementById('xapkVersion').value,
                "package_name": packageName,
                "name": appName,
                "locales_name": localesObj,
                "version_code": document.getElementById('versionCode').value,
                "version_name": document.getElementById('versionName').value,
                "min_sdk_version": document.getElementById('minSdk').value,
                "target_sdk_version": document.getElementById('targetSdk').value,
                "permissions": permissionsArray,
                "split_configs": splitConfigsArray,
                "total_size": document.getElementById('totalSize').value,
                "icon": document.getElementById('icon').value,
                "expansion_version": document.getElementById('expansionVersion').value,
                "expansions": expansionsArray,
                "split_apks": splitApksArray
            };

            const jsonString = JSON.stringify(manifestData, null, 4);
            document.getElementById('jsonPreview').textContent = jsonString;

            const fileBlob = new Blob([jsonString], { type: "application/json" });
            const fileUrl = URL.createObjectURL(fileBlob);
            const a = document.createElement('a');
            a.href = fileUrl; a.download = "manifest.json";
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(fileUrl);
        }
    </script>
</body>
</html>
