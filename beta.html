<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAPK Manifest Creator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 25px;}
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }
        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }
        
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #555;}
        .flex-label { display: flex; justify-content: space-between; align-items: center; }
        .sync-toggle { font-weight: normal; font-size: 13px; cursor: pointer; color: #e67e22; display: flex; align-items: center; gap: 5px;}
        
        input[type="text"], input[type="number"], textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
        }
        textarea { resize: vertical; min-height: 100px; }
        
        /* Font monospace cho các ô chứa JSON để dễ nhìn code */
        .json-area {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f8f9fa;
            font-size: 13px;
            min-height: 150px;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        button:hover { background-color: #0056b3; }
        .result-box { margin-top: 30px; }
        pre {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>XAPK Manifest Creator</h2>
        
        <div class="grid-2">
            <div class="form-group full-width">
                <label>XAPK Version (Phiên bản chuẩn XAPK):</label>
                <input type="text" id="xapkVersion" value="2">
            </div>

            <div class="form-group">
                <label>Package Name (Tên gói ứng dụng):</label>
                <input type="text" id="packageName" value="com.example.app" oninput="updateSyncData()">
            </div>

            <div class="form-group">
                <label>App Name (Tên ứng dụng):</label>
                <input type="text" id="appName" value="My Application" oninput="updateSyncData()">
            </div>
            
            <div class="form-group full-width">
                <div class="flex-label">
                    <label>Locales Name (Danh sách ngôn ngữ):</label>
                    <label class="sync-toggle">
                        <input type="checkbox" id="syncLocales" checked onchange="updateSyncData()"> Auto-sync (Tự động đồng bộ)
                    </label>
                </div>
                <textarea id="localesArea" class="json-area"></textarea>
            </div>

            <div class="form-group">
                <label>Version Code (Mã phiên bản):</label>
                <input type="text" id="versionCode" value="1">
            </div>
            <div class="form-group">
                <label>Version Name (Tên phiên bản):</label>
                <input type="text" id="versionName" value="1.0">
            </div>

            <div class="form-group">
                <label>Min SDK Version (SDK tối thiểu):</label>
                <input type="text" id="minSdk" value="21">
            </div>
            <div class="form-group">
                <label>Target SDK Version (SDK mục tiêu):</label>
                <input type="text" id="targetSdk" value="33">
            </div>

            <div class="form-group full-width">
                <label>Permissions (Quyền hạn - Mỗi quyền 1 dòng):</label>
                <textarea id="permissions">android.permission.INTERNET
android.permission.ACCESS_NETWORK_STATE</textarea>
            </div>

            <div class="form-group full-width">
                <label>Split Configs (ID tệp chia nhỏ - Mỗi ID 1 dòng):</label>
                <textarea id="splitConfigs" oninput="updateSyncData()">config.xxhdpi
config.en
config.arm64_v8a</textarea>
            </div>

            <div class="form-group">
                <label>Total Size (Tổng kích thước dạng Bytes):</label>
                <input type="text" id="totalSize" value="10485760">
            </div>

            <div class="form-group">
                <label>Icon File Name (Tên tệp biểu tượng):</label>
                <input type="text" id="icon" value="icon.png">
            </div>

            <div class="form-group full-width">
                <label>Expansion Version (Phiên bản OBB):</label>
                <input type="text" id="expansionVersion" value="1" oninput="updateSyncData()">
            </div>

            <div class="form-group full-width">
                <div class="flex-label">
                    <label>Expansions (Danh sách tệp mở rộng/OBB):</label>
                    <label class="sync-toggle">
                        <input type="checkbox" id="syncExpansions" checked onchange="updateSyncData()"> Auto-sync (Tự động đồng bộ)
                    </label>
                </div>
                <textarea id="expansionsArea" class="json-area"></textarea>
            </div>

            <div class="form-group full-width">
                <label>Base APK File Name (Tên tệp APK gốc):</label>
                <input type="text" id="baseApk" value="base.apk" oninput="updateSyncData()">
            </div>

            <div class="form-group full-width">
                <div class="flex-label">
                    <label>Split APKs (Danh sách tệp APK chia nhỏ):</label>
                    <label class="sync-toggle">
                        <input type="checkbox" id="syncSplitApks" checked onchange="updateSyncData()"> Auto-sync (Tự động đồng bộ)
                    </label>
                </div>
                <textarea id="splitApksArea" class="json-area"></textarea>
            </div>
        </div>

        <button onclick="generateAndDownloadJSON()">Generate and Download JSON (Tạo và Tải xuống)</button>

        <div class="result-box">
            <label>Preview (Xem trước nội dung tệp):</label>
            <pre id="jsonPreview">// Click the button to generate (Bấm nút để tạo)</pre>
        </div>
    </div>

    <script>
        const languageCodes = ["af","am","ar","az-AZ","bg","bn-BD","br","ca","cs","da","de","el","en","en-AU","en-GB","en-IN","es","es-US","et-EE","eu-ES","fa","fi","fr","fr-CA","gl-ES","gu-IN","hi","hr","hu","hy-AM","in","is-IS","it","iw","ja","ka-GE","kk-KZ","km-KH","kn-IN","ko","ky-KG","lo-LA","lt","lv","mk-MK","ml-IN","mn-MN","mr-IN","ms-MY","my-MM","nb","ne-NP","nl","pa-IN","pl","pt","pt-BR","pt-PT","ro","ru","si-LK","sk","sl","sq-AL","sr","sv","sw","ta-IN","te-IN","th","tl","tr","uk","ur-PK","uz-UZ","vi","zh","zh-CN","zh-HK","zh-TW","zu"];

        // Hàm cập nhật dữ liệu tự động cho 3 Textarea JSON khi người dùng gõ
        function updateSyncData() {
            // 1. Cập nhật Locales Name
            if (document.getElementById('syncLocales').checked) {
                const appName = document.getElementById('appName').value;
                const localesObj = {};
                languageCodes.forEach(lang => { localesObj[lang] = appName; });
                document.getElementById('localesArea').value = JSON.stringify(localesObj, null, 4);
            }

            // 2. Cập nhật Expansions
            if (document.getElementById('syncExpansions').checked) {
                const pkg = document.getElementById('packageName').value;
                const expVer = document.getElementById('expansionVersion').value;
                const expArr = [
                    {
                        "file": `Android/obb/${pkg}/main.${expVer}.${pkg}.obb`,
                        "install_location": "EXTERNAL_STORAGE",
                        "install_path": `Android/obb/${pkg}/main.${expVer}.${pkg}.obb`
                    },
                    {
                        "file": `Android/obb/${pkg}/patch.${expVer}.${pkg}.obb`,
                        "install_location": "EXTERNAL_STORAGE",
                        "install_path": `Android/obb/${pkg}/patch.${expVer}.${pkg}.obb`
                    }
                ];
                document.getElementById('expansionsArea').value = JSON.stringify(expArr, null, 4);
            }

            // 3. Cập nhật Split APKs
            if (document.getElementById('syncSplitApks').checked) {
                const baseApk = document.getElementById('baseApk').value;
                const splitsArray = document.getElementById('splitConfigs').value.split('\n').map(s => s.trim()).filter(s => s !== "");
                const splitApksArray = [ { "file": baseApk, "id": "base" } ];
                splitsArray.forEach(idConfig => {
                    splitApksArray.push({ "file": idConfig + ".apk", "id": idConfig });
                });
                document.getElementById('splitApksArea').value = JSON.stringify(splitApksArray, null, 4);
            }
        }

        // Chạy hàm đồng bộ lần đầu tiên khi trang web vừa tải xong
        window.onload = updateSyncData;

        function generateAndDownloadJSON() {
            try {
                // Đọc và kiểm tra lỗi cú pháp của 3 trường thủ công trước
                // JSON.parse sẽ chuyển chuỗi văn bản người dùng gõ lại thành Object chuẩn
                const localesParsed = JSON.parse(document.getElementById('localesArea').value);
                const expansionsParsed = JSON.parse(document.getElementById('expansionsArea').value);
                const splitApksParsed = JSON.parse(document.getElementById('splitApksArea').value);

                // Lấy các dữ liệu còn lại
                const permissionsArray = document.getElementById('permissions').value.split('\n').map(p => p.trim()).filter(p => p !== "");
                const splitConfigsArray = document.getElementById('splitConfigs').value.split('\n').map(s => s.trim()).filter(s => s !== "");

                // ĐÓNG GÓI JSON: Thứ tự chính xác theo yêu cầu
                const manifestData = {
                    "xapk_version": document.getElementById('xapkVersion').value,
                    "package_name": document.getElementById('packageName').value,
                    "name": document.getElementById('appName').value,
                    "locales_name": localesParsed,
                    "version_code": document.getElementById('versionCode').value,
                    "version_name": document.getElementById('versionName').value,
                    "min_sdk_version": document.getElementById('minSdk').value,
                    "target_sdk_version": document.getElementById('targetSdk').value,
                    "permissions": permissionsArray,
                    "split_configs": splitConfigsArray,
                    "total_size": document.getElementById('totalSize').value,
                    "icon": document.getElementById('icon').value,
                    "expansion_version": document.getElementById('expansionVersion').value,
                    "expansions": expansionsParsed,
                    "split_apks": splitApksParsed
                };

                const jsonString = JSON.stringify(manifestData, null, 4);

                // Hiển thị Preview
                document.getElementById('jsonPreview').textContent = jsonString;

                // Tải xuống file
                const fileBlob = new Blob([jsonString], { type: "application/json" });
                const fileUrl = URL.createObjectURL(fileBlob);
                const downloadLink = document.createElement('a');
                downloadLink.href = fileUrl;
                downloadLink.download = "manifest.json";
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                URL.revokeObjectURL(fileUrl);

            } catch (error) {
                // Nếu người dùng nhập sai cấu trúc JSON, hiển thị thông báo lỗi
                alert("Error (Lỗi): Cấu trúc JSON tại mục Locales, Expansions hoặc Split APKs không hợp lệ. Vui lòng kiểm tra lại dấu ngoặc và dấu phẩy.\n\nChi tiết lỗi: " + error.message);
            }
        }
    </script>
</body>
</html>
