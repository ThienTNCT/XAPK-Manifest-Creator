<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAPK Manifest Creator Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 25px;}
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }
        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }
        
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #555;}
        
        input[type="text"], input[type="number"], textarea, select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        .dynamic-container {
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 5px;
            background-color: #fafafa;
        }
        .dynamic-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .dynamic-row input { flex: 1; }
        
        .btn-action {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            white-space: nowrap;
        }
        .btn-add { background-color: #2ecc71; color: white; margin-bottom: 10px; }
        .btn-add:hover { background-color: #27ae60; }
        
        .btn-remove { background-color: #e74c3c; color: white; }
        .btn-remove:hover { background-color: #c0392b; }
        
        /* Trạng thái nút bị khóa (dành cho Base APK) */
        .btn-locked { background-color: #bdc3c7; color: white; cursor: not-allowed; }
        
        /* Trạng thái Ẩn/Hiện (dành cho Main/Patch OBB) */
        .btn-toggle { background-color: #f39c12; color: white; width: 60px; text-align: center;}
        .btn-toggle:hover { background-color: #e67e22; }
        .input-disabled { opacity: 0.4; background-color: #ecf0f1; cursor: not-allowed; }

        .btn-main {
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        .btn-main:hover { background-color: #0056b3; }
        
        .result-box { margin-top: 30px; }
        pre {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>XAPK Manifest Creator</h2>
        
        <div class="grid-2">
            <div class="form-group full-width">
                <label>XAPK Version (Phiên bản chuẩn XAPK):</label>
                <input type="text" id="xapkVersion" value="2">
            </div>

            <div class="form-group">
                <label>Package Name (Tên gói ứng dụng):</label>
                <input type="text" id="packageName" value="com.example.app" oninput="triggerSmartAutoFill()">
            </div>

            <div class="form-group">
                <label>App Name (Tên ứng dụng gốc):</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="appName" value="My Application" style="flex: 2;" onchange="translateAllLocales()">
                    <select id="sourceLang" style="flex: 1;" title="Ngôn ngữ gốc để dịch tự động" onchange="translateAllLocales()">
                        <option value="auto">Auto-Detect</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group full-width dynamic-container">
                <label>Locales Name (Danh sách ngôn ngữ & Dịch tự động):</label>
                <button type="button" class="btn-action btn-add" onclick="addLocaleRow()">+ Add Locale (Thêm ngôn ngữ)</button>
                <div id="localesContainer"></div>
                <datalist id="localeList"></datalist>
            </div>

            <div class="form-group">
                <label>Version Code (Mã phiên bản):</label>
                <input type="text" id="versionCode" value="1">
            </div>
            <div class="form-group">
                <label>Version Name (Tên phiên bản):</label>
                <input type="text" id="versionName" value="1.0">
            </div>

            <div class="form-group">
                <label>Min SDK Version (SDK tối thiểu):</label>
                <input type="text" id="minSdk" value="21">
            </div>
            <div class="form-group">
                <label>Target SDK Version (SDK mục tiêu):</label>
                <input type="text" id="targetSdk" value="33">
            </div>

            <div class="form-group full-width dynamic-container">
                <label>Permissions (Quyền hạn):</label>
                <button type="button" class="btn-action btn-add" onclick="addPermissionRow()">+ Add Permission (Thêm quyền)</button>
                <div id="permissionsContainer"></div>
                <datalist id="permissionsList"></datalist>
            </div>

            <div class="form-group full-width dynamic-container">
                <label>Split Configs (ID cấu hình chia nhỏ):</label>
                <button type="button" class="btn-action btn-add" onclick="addSyncedSplitConfigRow()">+ Add Split Config (Thêm ID)</button>
                <div id="splitConfigsContainer"></div>
                <datalist id="splitConfigsList"></datalist>
            </div>

            <div class="form-group">
                <label>Total Size (Tổng kích thước dạng Bytes):</label>
                <input type="text" id="totalSize" value="10485760">
            </div>

            <div class="form-group">
                <label>Icon File Name (Tên tệp biểu tượng):</label>
                <input type="text" id="icon" value="icon.png">
            </div>

            <div class="form-group full-width">
                <label>Expansion Version (Phiên bản OBB):</label>
                <input type="text" id="expansionVersion" value="1" oninput="triggerSmartAutoFill()">
            </div>

            <div class="form-group full-width dynamic-container">
                <label>Expansions (Danh sách tệp mở rộng/OBB):</label>
                <button type="button" class="btn-action btn-add" onclick="addExpansionRow()">+ Add Other Expansion (Thêm tệp khác)</button>
                
                <div id="expansionsContainer">
                    <div class="dynamic-row">
                        <input type="text" id="exp-main-file" class="exp-file" placeholder="Main OBB File Path">
                        <button type="button" class="btn-action btn-toggle" onclick="toggleExpansionState(this)">Ẩn</button>
                    </div>
                    <div class="dynamic-row">
                        <input type="text" id="exp-patch-file" class="exp-file" placeholder="Patch OBB File Path">
                        <button type="button" class="btn-action btn-toggle" onclick="toggleExpansionState(this)">Ẩn</button>
                    </div>
                </div>
            </div>

            <div class="form-group full-width dynamic-container">
                <label>Split APKs (Danh sách tệp APK gốc & chia nhỏ):</label>
                <button type="button" class="btn-action btn-add" onclick="addSplitApkRow()">+ Add Extra APK (Thêm tệp APK ngoài)</button>
                
                <div id="splitApksContainer">
                    <div class="dynamic-row" id="row-base-apk">
                        <input type="text" id="apk-base-file" class="apk-file" placeholder="File Name (vd: base.apk)" style="background-color: #fcfcfc; border-color: #bdc3c7;">
                        <input type="text" class="apk-id" value="base" readonly style="background-color: #ecf0f1; cursor: not-allowed; color:#7f8c8d;" title="Không thể đổi ID của Base APK">
                        <button type="button" class="btn-action btn-locked" title="Base APK là bắt buộc, không thể xóa">X</button>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn-main" onclick="generateAndDownloadJSON()">Generate and Download JSON (Tạo và Tải xuống)</button>

        <div class="result-box">
            <label>Preview (Xem trước nội dung tệp):</label>
            <pre id="jsonPreview">// Click the button to generate (Bấm nút để tạo)</pre>
        </div>
    </div>

    <script>
        const languageCodes = ["af","am","ar","az-AZ","bg","bn-BD","br","ca","cs","da","de","el","en","en-AU","en-GB","en-IN","es","es-US","et-EE","eu-ES","fa","fi","fr","fr-CA","gl-ES","gu-IN","hi","hr","hu","hy-AM","in","is-IS","it","iw","ja","ka-GE","kk-KZ","km-KH","kn-IN","ko","ky-KG","lo-LA","lt","lv","mk-MK","ml-IN","mn-MN","mr-IN","ms-MY","my-MM","nb","ne-NP","nl","pa-IN","pl","pt","pt-BR","pt-PT","ro","ru","si-LK","sk","sl","sq-AL","sr","sv","sw","ta-IN","te-IN","th","tl","tr","uk","ur-PK","uz-UZ","vi","zh","zh-CN","zh-HK","zh-TW","zu"];
        const allPermissions = ["android.permission.INTERNET", "android.permission.ACCESS_NETWORK_STATE"]; // Rút gọn để mẫu gọn gàng, bạn có thể copy mảng dài vào đây
        const allSplitConfigs = ["split_config.arm64_v8a", "config.arm64_v8a", "config.xxhdpi", "config.en"];

        // --- 1. TÍNH NĂNG SMART AUTO FILL ---
        function triggerSmartAutoFill() {
            const pkg = document.getElementById('packageName').value.trim();
            const expVer = document.getElementById('expansionVersion').value.trim();

            // Tự điền OBB (Chỉ điền khi Trường đó không bị "Ẩn")
            if (pkg && expVer) {
                const mainExp = document.getElementById('exp-main-file');
                if (!mainExp.disabled) mainExp.value = `Android/obb/${pkg}/main.${expVer}.${pkg}.obb`;

                const patchExp = document.getElementById('exp-patch-file');
                if (!patchExp.disabled) patchExp.value = `Android/obb/${pkg}/patch.${expVer}.${pkg}.obb`;
            }

            // Tự điền Base APK
            if (pkg) {
                const baseApk = document.getElementById('apk-base-file');
                if (baseApk) baseApk.value = `${pkg}.apk`;
            }
        }

        // --- 2. TÍNH NĂNG ẨN/HIỆN OBB (Chống lỗi Xóa nhầm) ---
        function toggleExpansionState(btn) {
            const row = btn.closest('.dynamic-row');
            const input = row.querySelector('.exp-file');
            
            if (input.disabled) {
                // Bật lại
                input.disabled = false;
                input.classList.remove('input-disabled');
                btn.textContent = 'Ẩn';
                btn.style.backgroundColor = '#f39c12';
                triggerSmartAutoFill(); // Cập nhật lại giá trị chuẩn khi Bật
            } else {
                // Tắt đi
                input.disabled = true;
                input.classList.add('input-disabled');
                btn.textContent = 'Đã Ẩn';
                btn.style.backgroundColor = '#7f8c8d';
            }
        }

        // --- 3. ĐỒNG BỘ CONFIGS VÀ APKS (Sợi dây tàng hình) ---
        function addSyncedSplitConfigRow(configValue = '') {
            // Tạo 1 ID ngẫu nhiên để buộc 2 dòng này lại với nhau
            const syncId = 'sync_' + Math.random().toString(36).substr(2, 9);
            
            const containerConfig = document.getElementById('splitConfigsContainer');
            const containerApk = document.getElementById('splitApksContainer');

            // Tạo dòng Config
            const rowConfig = document.createElement('div');
            rowConfig.className = 'dynamic-row';
            rowConfig.setAttribute('data-sync-id', syncId);
            rowConfig.innerHTML = `
                <input type="text" class="config-val" placeholder="vd: config.xxhdpi" value="${configValue}" list="splitConfigsList" oninput="syncToApkRow('${syncId}', this.value)">
                <button type="button" class="btn-action btn-remove" onclick="removeSyncedRows('${syncId}')">X</button>
            `;
            containerConfig.appendChild(rowConfig);

            // Tạo dòng APK (Liên kết ID)
            const rowApk = document.createElement('div');
            rowApk.className = 'dynamic-row';
            rowApk.setAttribute('data-sync-id', syncId);
            const apkFileName = configValue ? `${configValue}.apk` : '';
            rowApk.innerHTML = `
                <input type="text" class="apk-file" placeholder="File Name (Tự động chạy theo Config)" value="${apkFileName}">
                <input type="text" class="apk-id" placeholder="ID (Tự động chạy theo Config)" value="${configValue}">
                <button type="button" class="btn-action btn-remove" onclick="removeSyncedRows('${syncId}')">X</button>
            `;
            containerApk.appendChild(rowApk);
        }

        // Hàm luân chuyển dữ liệu từ Config -> APK khi gõ
        function syncToApkRow(syncId, value) {
            const apkRow = document.querySelector(`#splitApksContainer .dynamic-row[data-sync-id="${syncId}"]`);
            if (apkRow) {
                apkRow.querySelector('.apk-id').value = value;
                apkRow.querySelector('.apk-file').value = value ? value + '.apk' : '';
            }
        }

        // Hàm Xóa cả 2 dòng cùng lúc để không bao giờ bị lệch
        function removeSyncedRows(syncId) {
            const configRow = document.querySelector(`#splitConfigsContainer .dynamic-row[data-sync-id="${syncId}"]`);
            if (configRow) configRow.remove();

            const apkRow = document.querySelector(`#splitApksContainer .dynamic-row[data-sync-id="${syncId}"]`);
            if (apkRow) apkRow.remove();
        }

        // --- CÁC HÀM THÊM TRƯỜNG DỮ LIỆU ĐỘC LẬP KHÁC ---
        function addLocaleRow(langCode = '', appName = '') {
            const container = document.getElementById('localesContainer');
            const row = document.createElement('div');
            row.className = 'dynamic-row';
            row.innerHTML = `
                <input type="text" class="loc-code" placeholder="Mã (vd: vi)" value="${langCode}" list="localeList">
                <input type="text" class="loc-name" placeholder="Tên App bản địa hóa" value="${appName}">
                <button type="button" class="btn-action btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(row);

            row.querySelector('.loc-code').addEventListener('change', async function() {
                const targetCode = this.value.trim();
                const sourceText = document.getElementById('appName').value.trim();
                const sourceLang = document.getElementById('sourceLang').value;
                const nameInput = row.querySelector('.loc-name');
                if (targetCode && sourceText) {
                    nameInput.value = "Đang dịch...";
                    nameInput.value = await translateText(sourceText, sourceLang, targetCode);
                }
            });
        }

        function addPermissionRow(permValue = '') {
            const container = document.getElementById('permissionsContainer');
            const row = document.createElement('div');
            row.className = 'dynamic-row';
            row.innerHTML = `
                <input type="text" class="perm-val" placeholder="vd: android.permission.INTERNET" value="${permValue}" list="permissionsList">
                <button type="button" class="btn-action btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(row);
        }

        // Thêm Expansion Độc Lập (Dành cho file mở rộng không phải Main/Patch OBB)
        function addExpansionRow(filePath = '') {
            const container = document.getElementById('expansionsContainer');
            const row = document.createElement('div');
            row.className = 'dynamic-row';
            row.innerHTML = `
                <input type="text" class="exp-file" placeholder="Đường dẫn tệp mở rộng tùy chỉnh" value="${filePath}">
                <button type="button" class="btn-action btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(row);
        }

        // Thêm APK Độc Lập (Dành cho tệp APK không dính dáng tới Config)
        function addSplitApkRow(fileName = '', fileId = '') {
            const container = document.getElementById('splitApksContainer');
            const row = document.createElement('div');
            row.className = 'dynamic-row';
            row.innerHTML = `
                <input type="text" class="apk-file" placeholder="Tên tệp APK ngoài" value="${fileName}">
                <input type="text" class="apk-id" placeholder="ID tệp" value="${fileId}">
                <button type="button" class="btn-action btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(row);
        }

        // --- DỊCH THUẬT GOOGLE ---
        async function translateText(text, sourceLang, targetLang) {
            if (!text || !targetLang) return text;
            let ggLang = targetLang.split('-')[0]; 
            if (targetLang.startsWith("zh") || targetLang.startsWith("pt")) ggLang = targetLang;
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${ggLang}&dt=t&q=${encodeURIComponent(text)}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                return data[0][0][0];
            } catch (error) { return text; }
        }

        async function translateAllLocales() {
            const sourceText = document.getElementById('appName').value.trim();
            const sourceLang = document.getElementById('sourceLang').value;
            if (!sourceText) return;
            document.querySelectorAll('#localesContainer .dynamic-row').forEach(async row => {
                const codeInput = row.querySelector('.loc-code');
                const nameInput = row.querySelector('.loc-name');
                if (codeInput.value.trim()) {
                    nameInput.value = "Đang dịch...";
                    nameInput.value = await translateText(sourceText, sourceLang, codeInput.value.trim());
                }
            });
        }

        // --- KHỞI TẠO DỮ LIỆU ---
        function populateDatalist(elementId, dataArray) {
            const dataList = document.getElementById(elementId);
            dataArray.forEach(item => {
                const option = document.createElement('option');
                option.value = item;
                dataList.appendChild(option);
            });
        }

        window.onload = function() {
            populateDatalist('localeList', languageCodes);
            populateDatalist('permissionsList', allPermissions);
            populateDatalist('splitConfigsList', allSplitConfigs);

            const sourceLangSelect = document.getElementById('sourceLang');
            languageCodes.forEach(code => {
                const option = document.createElement('option');
                option.value = code;
                option.textContent = code;
                sourceLangSelect.appendChild(option);
            });

            addLocaleRow('en', '');
            addLocaleRow('vi', '');
            translateAllLocales();

            addPermissionRow('android.permission.INTERNET');
            addPermissionRow('android.permission.ACCESS_NETWORK_STATE');

            // Tạo các Config mẫu (Nó sẽ tự động đẻ ra các dòng APK liên kết ở bên dưới)
            addSyncedSplitConfigRow('config.xxhdpi');
            addSyncedSplitConfigRow('config.arm64_v8a');
            addSyncedSplitConfigRow('config.en');

            // Chạy Smart Auto Fill lần đầu để nạp tên Base APK và OBB
            triggerSmartAutoFill();
        };

        // --- HÀM XUẤT JSON ---
        function generateAndDownloadJSON() {
            const manifestData = {
                "xapk_version": document.getElementById('xapkVersion').value,
                "package_name": document.getElementById('packageName').value,
                "name": document.getElementById('appName').value,
                "locales_name": {},
                "version_code": document.getElementById('versionCode').value,
                "version_name": document.getElementById('versionName').value,
                "min_sdk_version": document.getElementById('minSdk').value,
                "target_sdk_version": document.getElementById('targetSdk').value,
                "permissions": [],
                "split_configs": [],
                "total_size": document.getElementById('totalSize').value,
                "icon": document.getElementById('icon').value,
                "expansion_version": document.getElementById('expansionVersion').value,
                "expansions": [],
                "split_apks": []
            };

            document.querySelectorAll('#localesContainer .dynamic-row').forEach(row => {
                const code = row.querySelector('.loc-code').value.trim();
                const name = row.querySelector('.loc-name').value.trim();
                if (code) manifestData.locales_name[code] = name;
            });

            document.querySelectorAll('#permissionsContainer .dynamic-row').forEach(row => {
                const val = row.querySelector('.perm-val').value.trim();
                if (val) manifestData.permissions.push(val);
            });

            document.querySelectorAll('#splitConfigsContainer .dynamic-row').forEach(row => {
                const val = row.querySelector('.config-val').value.trim();
                if (val) manifestData.split_configs.push(val);
            });

            document.querySelectorAll('#expansionsContainer .dynamic-row').forEach(row => {
                const input = row.querySelector('.exp-file');
                // Bỏ qua nếu dòng đó đang bị "Ẩn" (disabled)
                if (!input.disabled) {
                    const file = input.value.trim();
                    if (file) {
                        manifestData.expansions.push({
                            "file": file,
                            "install_location": "EXTERNAL_STORAGE",
                            "install_path": file
                        });
                    }
                }
            });

            document.querySelectorAll('#splitApksContainer .dynamic-row').forEach(row => {
                const file = row.querySelector('.apk-file').value.trim();
                const id = row.querySelector('.apk-id').value.trim();
                if (file) {
                    manifestData.split_apks.push({ "file": file, "id": id });
                }
            });

            const jsonString = JSON.stringify(manifestData, null, 4);
            document.getElementById('jsonPreview').textContent = jsonString;

            const fileBlob = new Blob([jsonString], { type: "application/json" });
            const fileUrl = URL.createObjectURL(fileBlob);
            const downloadLink = document.createElement('a');
            downloadLink.href = fileUrl;
            downloadLink.download = "manifest.json";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            URL.revokeObjectURL(fileUrl);
        }
    </script>
</body>
</html>
