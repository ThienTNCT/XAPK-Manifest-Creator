<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAPK Manifest Creator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 25px;}
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #555;}
        input, textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
        }
        textarea { resize: vertical; min-height: 100px; }
        .full-width { grid-column: span 2; }
        button {
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        button:hover { background-color: #0056b3; }
        .result-box { margin-top: 30px; }
        pre {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>XAPK Manifest Creator</h2>
        
        <div class="grid-2">
            <div class="form-group">
                <label>Package Name (Tên gói ứng dụng):</label>
                <input type="text" id="packageName" value="com.example.app">
            </div>
            <div class="form-group">
                <label>App Name (Tên ứng dụng):</label>
                <input type="text" id="appName" value="My Application">
            </div>
            
            <div class="form-group">
                <label>Version Code (Mã phiên bản):</label>
                <input type="text" id="versionCode" value="1">
            </div>
            <div class="form-group">
                <label>Version Name (Tên phiên bản):</label>
                <input type="text" id="versionName" value="1.0">
            </div>

            <div class="form-group">
                <label>Min SDK Version (SDK tối thiểu):</label>
                <input type="text" id="minSdk" value="21">
            </div>
            <div class="form-group">
                <label>Target SDK Version (SDK mục tiêu):</label>
                <input type="text" id="targetSdk" value="33">
            </div>

            <div class="form-group">
                <label>Total Size (Tổng kích thước dạng Bytes):</label>
                <input type="text" id="totalSize" value="10485760">
            </div>
            <div class="form-group">
                <label>Expansion Version (Phiên bản OBB):</label>
                <input type="text" id="expansionVersion" value="1">
            </div>
            
            <div class="form-group">
                <label>Base APK File Name (Tên tệp APK gốc):</label>
                <input type="text" id="baseApk" value="base.apk">
            </div>
            <div class="form-group">
                <label>Icon File Name (Tên tệp biểu tượng):</label>
                <input type="text" id="icon" value="icon.png">
            </div>

            <div class="form-group full-width">
                <label>Permissions (Quyền hạn - Mỗi quyền 1 dòng):</label>
                <textarea id="permissions">android.permission.INTERNET
android.permission.ACCESS_NETWORK_STATE</textarea>
            </div>

            <div class="form-group full-width">
                <label>Split Configs (ID tệp chia nhỏ - Mỗi ID 1 dòng):</label>
                <textarea id="splitConfigs">config.xxhdpi
config.en
config.arm64_v8a</textarea>
            </div>
        </div>

        <button onclick="generateAndDownloadJSON()">Generate and Download JSON (Tạo và Tải xuống)</button>

        <div class="result-box">
            <label>Preview (Xem trước nội dung tệp):</label>
            <pre id="jsonPreview">// Click the button to generate (Bấm nút để tạo)</pre>
        </div>
    </div>

    <script>
        // Danh sách các mã ngôn ngữ theo chuẩn bạn cung cấp
        const languageCodes = ["af","am","ar","az-AZ","bg","bn-BD","br","ca","cs","da","de","el","en","en-AU","en-GB","en-IN","es","es-US","et-EE","eu-ES","fa","fi","fr","fr-CA","gl-ES","gu-IN","hi","hr","hu","hy-AM","in","is-IS","it","iw","ja","ka-GE","kk-KZ","km-KH","kn-IN","ko","ky-KG","lo-LA","lt","lv","mk-MK","ml-IN","mn-MN","mr-IN","ms-MY","my-MM","nb","ne-NP","nl","pa-IN","pl","pt","pt-BR","pt-PT","ro","ru","si-LK","sk","sl","sq-AL","sr","sv","sw","ta-IN","te-IN","th","tl","tr","uk","ur-PK","uz-UZ","vi","zh","zh-CN","zh-HK","zh-TW","zu"];

        function generateAndDownloadJSON() {
            // Lấy dữ liệu từ các trường nhập liệu
            const packageName = document.getElementById('packageName').value;
            const appName = document.getElementById('appName').value;
            const versionCode = document.getElementById('versionCode').value;
            const versionName = document.getElementById('versionName').value;
            const minSdk = document.getElementById('minSdk').value;
            const targetSdk = document.getElementById('targetSdk').value;
            const totalSize = document.getElementById('totalSize').value;
            const iconName = document.getElementById('icon').value;
            const expVersion = document.getElementById('expansionVersion').value;
            const baseApk = document.getElementById('baseApk').value;

            // Xử lý mục locales_name
            const localesObj = {};
            languageCodes.forEach(lang => {
                localesObj[lang] = appName;
            });

            // Xử lý mục permissions
            const permissionsText = document.getElementById('permissions').value;
            const permissionsArray = permissionsText.split('\n').map(p => p.trim()).filter(p => p !== "");

            // Xử lý mục split_configs
            const splitConfigsText = document.getElementById('splitConfigs').value;
            const splitConfigsArray = splitConfigsText.split('\n').map(s => s.trim()).filter(s => s !== "");

            // Xử lý mục expansions (Tạo đường dẫn OBB tự động)
            const expansionsArray = [
                {
                    "file": `Android/obb/${packageName}/main.${expVersion}.${packageName}.obb`,
                    "install_location": "EXTERNAL_STORAGE",
                    "install_path": `Android/obb/${packageName}/main.${expVersion}.${packageName}.obb`
                },
                {
                    "file": `Android/obb/${packageName}/patch.${expVersion}.${packageName}.obb`,
                    "install_location": "EXTERNAL_STORAGE",
                    "install_path": `Android/obb/${packageName}/patch.${expVersion}.${packageName}.obb`
                }
            ];

            // Xử lý mục split_apks (Bao gồm Base APK và các Config APK)
            const splitApksArray = [
                { "file": baseApk, "id": "base" }
            ];
            splitConfigsArray.forEach(idConfig => {
                splitApksArray.push({
                    "file": idConfig + ".apk", 
                    "id": idConfig
                });
            });

            // ĐÓNG GÓI JSON: Thứ tự các trường được giữ đúng 100% theo mẫu của bạn từ trên xuống dưới
            const manifestData = {
                "xapk_version": "2",
                "package_name": packageName,
                "name": appName,
                "locales_name": localesObj,
                "version_code": versionCode,
                "version_name": versionName,
                "min_sdk_version": minSdk,
                "target_sdk_version": targetSdk,
                "permissions": permissionsArray,
                "split_configs": splitConfigsArray,
                "total_size": totalSize,
                "icon": iconName,
                "expansion_version": expVersion,
                "expansions": expansionsArray,
                "split_apks": splitApksArray
            };

            // Chuyển đổi đối tượng sang chuỗi JSON (thụt lề 4 khoảng trắng)
            const jsonString = JSON.stringify(manifestData, null, 4);

            // Cập nhật giao diện xem trước
            document.getElementById('jsonPreview').textContent = jsonString;

            // Xử lý tải tệp tin manifest.json xuống
            const fileBlob = new Blob([jsonString], { type: "application/json" });
            const fileUrl = URL.createObjectURL(fileBlob);
            const downloadLink = document.createElement('a');
            downloadLink.href = fileUrl;
            downloadLink.download = "manifest.json";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            URL.revokeObjectURL(fileUrl);
        }
    </script>
</body>
</html>
